name: Publish package

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version increment to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ inputs.release_type }} release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: |
          npm run lint
          npm run format:check
          npm run test:cov -- --runInBand
          npm run build

      - name: Configure release author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Increment version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          npm version "$RELEASE_TYPE" --no-git-tag-version --ignore-scripts
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Git tag $TAG already exists" >&2
            exit 1
          fi

          if npm view "nebur-regex@$VERSION" version >/dev/null 2>&1; then
            echo "nebur-regex@$VERSION is already published" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Commit version
        id: commit
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): $VERSION"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push version commit
        run: git push origin HEAD:main

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@nebur242"

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name="@nebur242/nebur-regex"
          npm publish --registry=https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: gh release create "$TAG" --target "$COMMIT_SHA" --generate-notes --title "$TAG"
